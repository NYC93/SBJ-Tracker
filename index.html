<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Broad Jump Tracker</title>
    
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript" id="opencv-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video, canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        #distance-box {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            padding: 14px 28px;
            background: rgba(18, 18, 18, 0.9);
            color: #00ffcc;
            font-size: 26px;
            font-weight: 800;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            z-index: 10;
        }

        #status {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 20px) + 10px);
            background: rgba(18, 18, 18, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output"></canvas>
        <div id="distance-box">Ready: 0 cm</div>
        <div id="status">Setting up...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const distanceBox = document.getElementById('distance-box');
        const statusText = document.getElementById('status');

        let poseDetector;
        let openCvReady = false;
        let detectedCups = [];

        document.getElementById('opencv-js').addEventListener('load', () => {
            cv['onRuntimeInitialized'] = () => {
                openCvReady = true;
                statusText.innerText = "Computer Vision Ready. Loading AI Tracker...";
                loadPoseModel();
            };
        });

        async function setupCamera() {
            const constraints = {
                video: {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    frameRate: { ideal: 30 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        resolve(video);
                    };
                });
            } catch (err) {
                statusText.innerText = "Camera error. Check iOS Permissions.";
            }
        }

        async function loadPoseModel() {
            const model = poseDetection.SupportedModels.BlazePose;
            poseDetector = await poseDetection.createDetector(model, { 
                runtime: 'tfjs', 
                modelType: 'lite'
            });
            statusText.innerText = "System Active. Line up your 4 white cups.";
            trackFrame();
        }

        // White Contrast Tracker
        function detectCupsFromFrame() {
            if (!openCvReady) return [];

            let src = cv.imread(canvas);
            let gray = new cv.Mat();
            let thresh = new cv.Mat();
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();

            // Convert frame to grayscale
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

            // High threshold (200 out of 255) ensures only bright white objects pop out against the black background
            cv.threshold(gray, thresh, 200, 255, cv.THRESH_BINARY);
            
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let temporaryCups = [];
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                
                // Keep objects within reasonable size boundaries
                if (area > 150 && area < 25000) {
                    let rect = cv.boundingRect(cnt);
                    let aspectRatio = rect.width / rect.height;

                    // Cups usually have an aspect ratio close to vertical rectangles
                    if (aspectRatio > 0.4 && aspectRatio < 1.6) {
                        temporaryCups.push({
                            x: rect.x + (rect.width / 2),
                            y: rect.y + (rect.height / 2)
                        });
                    }
                }
                cnt.delete();
            }

            gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); src.delete();

            // Remove nearby overlapping bounding points
            let uniqueCups = [];
            temporaryCups.forEach(cup => {
                if (!uniqueCups.some(u => Math.hypot(u.x - cup.x, u.y - cup.y) < 35)) {
                    uniqueCups.push(cup);
                }
            });

            // Order systematically from starting position to ending target position
            return uniqueCups.sort((a, b) => a.x - b.x).slice(0, 4);
        }

        async function trackFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            detectedCups = detectCupsFromFrame();

            // Render the "OK!" badge directly above each detected white cup
            detectedCups.forEach((cup) => {
                ctx.beginPath();
                ctx.arc(cup.x, cup.y - 20, 22, 0, 2 * Math.PI);
                ctx.fillStyle = "#00ffcc";
                ctx.fill();

                ctx.fillStyle = "#121212";
                ctx.font = "bold 13px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("OK!", cup.x, cup.y - 20);
            });

            statusText.innerText = `Cups Tracked: ${detectedCups.length}/4`;

            try {
                const poses = await poseDetector.estimatePoses(canvas, { maxPoses: 1, flipHorizontal: false });
                
                if (poses.length > 0 && detectedCups.length >= 2) {
                    const keypoints = poses[0].keypoints;
                    const leftAnkle = keypoints.find(k => k.name === 'left_ankle');
                    const rightAnkle = keypoints.find(k => k.name === 'right_ankle');

                    if (leftAnkle && rightAnkle && leftAnkle.score > 0.4) {
                        const startCup = detectedCups[0];
                        const leftDist = Math.abs(leftAnkle.x - startCup.x);
                        const rightDist = Math.abs(rightAnkle.x - startCup.x);
                        const backFoot = leftDist < rightDist ? leftAnkle : rightAnkle;

                        ctx.beginPath();
                        ctx.arc(backFoot.x, backFoot.y, 10, 0, 2 * Math.PI);
                        ctx.fillStyle = "#ff3366";
                        ctx.fill();

                        const pixelDistanceBetweenCups = Math.abs(detectedCups[1].x - detectedCups[0].x);
                        const pixelsPerCm = pixelDistanceBetweenCups / 100;
                        const horizontalDelta = Math.abs(backFoot.x - detectedCups[0].x);
                        
                        let calculatedDistanceCm = horizontalDelta / pixelsPerCm;
                        let finalDistance = Math.min(calculatedDistanceCm, 300);
                        
                        distanceBox.innerText = `${Math.round(finalDistance)} cm`;
                    }
                }
            } catch (e) {
                console.error(e);
            }

            requestAnimationFrame(trackFrame);
        }

        async function main() {
            await setupCamera();
        }

        main();
    </script>
</body>
</html>
